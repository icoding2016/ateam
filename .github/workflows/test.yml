name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Run static validation
        run: make validate
      - name: Quick smoke test
        run: bash install.sh --help

  install-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install bats (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Test install.sh (Linux)
        if: runner.os == 'Linux'
        run: make install-test
      - name: Quick smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\install.ps1 -Help
          if ($LASTEXITCODE -ne 0) { throw "install.ps1 -Help failed" }

      - name: Test install.ps1 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $results = Invoke-Pester -Script tests/test_install.ps1 -PassThru
          if ($results.Failed.Count -gt 0) {
            foreach ($test in $results.Failed) {
              Write-Host "::error file=tests/test_install.ps1::$($test.Describe) > $($test.Name): $($test.ErrorRecord.Exception.Message)"
            }
            throw "$($results.Failed.Count) test(s) failed"
          }
          Write-Host "✓ $($results.Passed.Count) tests passed"
